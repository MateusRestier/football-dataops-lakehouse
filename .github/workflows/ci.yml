name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      MINIO_ENDPOINT: "localhost:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/setup.py

      - name: Install pipeline package
        run: pip install -e pipeline/

      - name: Lint with ruff
        run: ruff check pipeline/pipeline/ tests/

      - name: Dagster definitions smoke test
        run: python -c "from pipeline.definitions import defs; defs.validate_loadable()"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
